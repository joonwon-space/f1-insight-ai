name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  backend-lint:
    name: Backend — Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install ".[dev]"

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

  backend-test:
    name: Backend — Tests
    runs-on: ubuntu-latest
    needs: backend-lint
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install ".[dev]"

      - name: Run pytest
        run: pytest --tb=short || echo "No tests found — skipping"
        env:
          MONGODB_URI: mongodb://localhost:27017
          ELASTICSEARCH_URL: http://localhost:9200
          OPENAI_API_KEY: test-key
          ANTHROPIC_API_KEY: test-key
          UNSPLASH_ACCESS_KEY: test-key

  frontend-lint:
    name: Frontend — Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: TypeScript type check + build
        run: npm run build
        env:
          VITE_API_URL: http://localhost:8000

  docker-build:
    name: Docker — Build Validation
    runs-on: ubuntu-latest
    needs: [backend-lint, frontend-lint]

    steps:
      - uses: actions/checkout@v4

      - name: Build backend Docker image
        run: docker build -t f1-backend:ci ./backend

      - name: Build frontend Docker image
        run: docker build --build-arg VITE_API_URL=http://localhost:8000 -t f1-frontend:ci ./frontend
